title: Stefanini Jewellery
description: Handcrafted jewellery — a family-run atelier.
author: Stefanini Jewellery

url: https://elpie89.github.io
baseurl: /stefanini-jewerly

lang: en

languages: ["en", "it"]
default_lang: "en"
exclude_from_localization: ["media", "assets", "libs", ".github", "CLAUDE.md", "README.md"]

plugins:
  - jekyll-multiple-languages-plugin

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - .bundle
  - README.md
  - CLAUDE.md
  - stefani-jewerly.code-workspace
  - node_modules

keep_files:
  - assets
  - libs
  - media
