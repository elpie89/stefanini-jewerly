<head>
    <!-- Meta Data -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    {% if page.description or site.description %}<meta name="description" content="{{ page.description | default: site.description }}">{% endif %}

    <!-- Favicon -->
    <link rel="shortcut icon" type="image/x-icon" href="{{ '/media/favicon.png' | relative_url }}">

    <!-- Dependency Styles -->
    <link rel="stylesheet" href="{{ '/libs/bootstrap/css/bootstrap.min.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/feather-font/css/iconfont.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/icomoon-font/css/icomoon.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/font-awesome/css/font-awesome.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/wpbingofont/css/wpbingofont.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/elegant-icons/css/elegant.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/slick/css/slick.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/slick/css/slick-theme.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/libs/mmenu/css/mmenu.min.css' | relative_url }}" type="text/css">

    <!-- Site Stylesheet -->
    <link rel="stylesheet" href="{{ '/assets/css/app.css' | relative_url }}" type="text/css">
    <link rel="stylesheet" href="{{ '/assets/css/responsive.css' | relative_url }}" type="text/css">

    <!-- Google Web Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
