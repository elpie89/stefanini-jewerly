---
layout: default
permalink: /404.html
body_class: page error404
header_class: site-header header-v1 bottom-border
sitemap: false
i18n_key: not_found
---

{% include lang.html %}
{%- assign page_t = t.not_found -%}
<div class="section-padding">
    <div class="section-container p-l-r">
        <div class="page-404">
            <div class="content-page-404">
                <div class="title-error">404</div>
                <div class="sub-title">{{ page_t.subtitle }}</div>
                <div class="sub-error">
                    {{ page_t.body }}
                </div>
                <a class="button" href="{{ '/' | relative_url }}">{{ page_t.back }}</a>
            </div>
        </div>
    </div>
</div>
