about:
  meta_title: "About Us"
  meta_description: "The story of Stefanini Jewellery — our atelier, our craft, our people."
  intro1:
    title: "About Us"
    paragraphs:
      - "Stefanini Jewellery was founded in 2023 on a simple idea: every jewel is a work of art."
      - "And like any work of art, it is shaped by a vision.<br>Ours is to listen and give form to the desires of the person who wears it."
  intro2:
    title: "Our Clients<br> Are The True Artists"
    paragraphs:
      - "We provide materials, expertise, and craftsmanship. They bring identity and meaning."
      - "Customization is at the heart of what we do: every detail, from gemstone color to volume, is designed to reflect a person."
  intro3:
    title: "Made In Italy,<br> Worn Around The World"
    paragraphs:
      - "All our jewelry is entirely made in Italy, combining craftsmanship with a contemporary approach."
      - "We are based in Sardinia during the summer and in Switzerland during the winter, following the rhythm of the seasons and our clients."

