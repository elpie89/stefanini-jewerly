contact:
  meta_title: "Contatti"
  meta_description: "Mettiti in contatto con Stefanini Jewellery."
  locations_title: "Le nostre destinazioni"
  locations_intro: "Stefanini Jewellery segue il ritmo delle stagioni, scegliendo luoghi che riflettono la nostra visione di eleganza e bellezza."
  summer:
    title: "Estate &mdash; Porto Cervo"
    paragraphs:
      - "Dal 2023 siamo presenti a Porto Cervo, nella prestigiosa Promenade du Port, nel cuore della Costa Smeralda."
      - "Un luogo unico, vibrante e sofisticato, che rappresenta per noi la destinazione ideale per la stagione estiva."
  winter:
    title: "Inverno &mdash; Gstaad"
    paragraphs:
      - "Durante l&rsquo;inverno ci trasferiamo a Gstaad, all&rsquo;interno del Palace Hotel."
      - "Un ambiente senza tempo, intimo e raffinato, che incarna perfettamente lo spirito di Stefanini Jewellery."
  closing: "Due luoghi iconici, una sola visione."
