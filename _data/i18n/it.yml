about:
  meta_title: "Chi siamo"
  meta_description: "La storia di Stefanini Jewellery &mdash; il nostro atelier, la nostra manifattura, le nostre persone."
  intro1:
    title: "Chi siamo"
    paragraphs:
      - "Stefanini Jewellery nasce nel 2023 da un&rsquo;idea essenziale: ogni gioiello &egrave; un&rsquo;opera d&rsquo;arte."
      - "E come ogni opera, prende forma da una visione.<br>La nostra &egrave; quella di ascoltare e dare forma ai desideri di chi lo indossa."
  intro2:
    title: "I nostri clienti<br> sono i veri artisti"
    paragraphs:
      - "Noi mettiamo materia, esperienza e sensibilit&agrave;. Loro danno identit&agrave; e significato."
      - "La customizzazione &egrave; il cuore del nostro lavoro: ogni dettaglio, dal colore delle pietre ai volumi, &egrave; pensato per riflettere una persona."
  intro3:
    title: "Made in Italy,<br> indossato nel mondo"
    paragraphs:
      - "Tutti i gioielli sono interamente realizzati in Italia, espressione di una manifattura attenta, contemporanea e senza compromessi."
      - "Siamo in Sardegna durante l&rsquo;estate e in Svizzera durante l&rsquo;inverno, seguendo il ritmo delle stagioni e dei nostri clienti."

